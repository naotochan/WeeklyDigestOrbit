# スクレイピング対象サイト定義
# 各サイトのCSSセレクタを指定してニュース記事を抽出する
targets:
  - name: "Robotics Business Review"
    url: "https://www.roboticsbusinessreview.com/news/"
    selectors:
      article: "article.post"
      title: "h2 a"
      link: "h2 a"
      date: "time"
      snippet: ".entry-summary p"
    enabled: true

