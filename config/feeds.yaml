# RSSフィード一覧 — Robotics / Physical AI / Embodied AI
#
# filter_keywords を指定したフィードは、タイトルまたは本文に
# いずれかのキーワードを含む記事のみ取得する（大文字小文字不問）。
# 専門フィードには filter_keywords を設定しない（全件取得）。

# 共通キーワード定義（YAMLアンカー）
_keywords: &robotics_keywords
  - robot
  - ロボット
  - ロボティクス
  - humanoid
  - ヒューマノイド
  - embodied
  - physical AI
  - フィジカルAI
  - manipulation
  - locomotion
  - autonomous
  - 自律
  - 自動運転
  - ドローン
  - drone
  - actuator
  - アクチュエータ
  - sim2real
  - reinforcement learning
  - 強化学習
  - imitation learning
  - 模倣学習

